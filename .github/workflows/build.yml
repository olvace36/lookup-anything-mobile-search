name: Build LookupAnythingMobileSearch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Build
        run: dotnet build LookupAnythingMobileSearch/LookupAnythingMobileSearch.csproj --configuration Release

      - name: Package mod
        run: |
          mkdir -p output/LookupAnythingMobileSearch
          cp LookupAnythingMobileSearch/bin/Release/net6.0/LookupAnythingMobileSearch.dll output/LookupAnythingMobileSearch/
          cp LookupAnythingMobileSearch/manifest.json output/LookupAnythingMobileSearch/
          cd output && zip -r LookupAnythingMobileSearch.zip LookupAnythingMobileSearch/

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: LookupAnythingMobileSearch
          path: output/LookupAnythingMobileSearch.zip
